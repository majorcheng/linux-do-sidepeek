name: Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  static-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup archive tools
        run: sudo apt-get update && sudo apt-get install -y jq zip unzip

      - name: Run static checks
        run: bash scripts/check.sh

      - name: Build smoke artifacts
        run: |
          build_output=$(bash scripts/build-release-artifacts.sh "v0.0.0-ci" "$PWD/dist")
          echo "$build_output"
          echo "$build_output" | grep '^CHROME_ZIP_PATH=' >> "$GITHUB_ENV"
          echo "$build_output" | grep '^FIREFOX_XPI_PATH=' >> "$GITHUB_ENV"

      - name: Validate smoke artifacts
        run: bash scripts/check-release-artifacts.sh "${{ env.CHROME_ZIP_PATH }}" "${{ env.FIREFOX_XPI_PATH }}"
